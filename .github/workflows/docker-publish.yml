name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Portal build check
        run: cd apps/portal && npm ci && npm run build

  changes:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'services/core/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.core'
            control_plane:
              - 'services/control-plane/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.control-plane'
            portal:
              - 'apps/portal/**'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.portal'
            ingestion:
              - 'services/ingestion-gateway/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.ingestion'
            bot:
              - 'services/bot/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.bot'
            analyzer:
              - 'services/analyzer/**'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.analyzer'

      - name: Build Docker matrix
        id: matrix
        shell: bash
        env:
          BUILD_ALL: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          CORE_CHANGED: ${{ steps.filter.outputs.core }}
          CONTROL_PLANE_CHANGED: ${{ steps.filter.outputs.control_plane }}
          PORTAL_CHANGED: ${{ steps.filter.outputs.portal }}
          INGESTION_CHANGED: ${{ steps.filter.outputs.ingestion }}
          BOT_CHANGED: ${{ steps.filter.outputs.bot }}
          ANALYZER_CHANGED: ${{ steps.filter.outputs.analyzer }}
        run: |
          json='{"include":['
          sep=''

          add() {
            json="${json}${sep}$1"
            sep=','
          }

          if [[ "$BUILD_ALL" == "true" || "$CORE_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-core","dockerfile":"infra/docker/Dockerfile.core"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$CONTROL_PLANE_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-control-plane","dockerfile":"infra/docker/Dockerfile.control-plane"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$PORTAL_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-portal","dockerfile":"infra/docker/Dockerfile.portal"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$INGESTION_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-ingestion","dockerfile":"infra/docker/Dockerfile.ingestion"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$BOT_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-bot","dockerfile":"infra/docker/Dockerfile.bot"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$ANALYZER_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-analyzer","dockerfile":"infra/docker/Dockerfile.analyzer"}'
          fi

          json="${json}]}";
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

          if [[ "$json" == '{"include":[]}' ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  docker:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
