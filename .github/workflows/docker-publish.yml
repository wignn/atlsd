name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace



  changes:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            control_plane:
              - 'services/control-plane/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.control-plane'
            ingestion:
              - 'services/ingestion-gateway/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.ingestion'
            bot:
              - 'services/bot/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.bot'
            analyzer:
              - 'services/analyzer/**'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.analyzer'
            api_gateway:
              - 'services/api-gateway/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.api-gateway'
            market_data:
              - 'services/market-data/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.market-data'
            realtime_gateway:
              - 'services/realtime-gateway/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.realtime-gateway'
            news_service:
              - 'services/news-service/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.news-service'
            intelligence_service:
              - 'services/intelligence-service/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - 'infra/docker/Dockerfile.intelligence-service'

      - name: Build Docker matrix
        id: matrix
        shell: bash
        env:
          BUILD_ALL: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          CONTROL_PLANE_CHANGED: ${{ steps.filter.outputs.control_plane }}
          INGESTION_CHANGED: ${{ steps.filter.outputs.ingestion }}
          BOT_CHANGED: ${{ steps.filter.outputs.bot }}
          ANALYZER_CHANGED: ${{ steps.filter.outputs.analyzer }}
          API_GATEWAY_CHANGED: ${{ steps.filter.outputs.api_gateway }}
          MARKET_DATA_CHANGED: ${{ steps.filter.outputs.market_data }}
          REALTIME_GATEWAY_CHANGED: ${{ steps.filter.outputs.realtime_gateway }}
          NEWS_SERVICE_CHANGED: ${{ steps.filter.outputs.news_service }}
          INTELLIGENCE_SERVICE_CHANGED: ${{ steps.filter.outputs.intelligence_service }}
        run: |
          json='{"include":['
          sep=''

          add() {
            json="${json}${sep}$1"
            sep=','
          }

          if [[ "$BUILD_ALL" == "true" || "$CONTROL_PLANE_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-control-plane","dockerfile":"infra/docker/Dockerfile.control-plane"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$INGESTION_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-ingestion","dockerfile":"infra/docker/Dockerfile.ingestion"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$BOT_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-bot","dockerfile":"infra/docker/Dockerfile.bot"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$ANALYZER_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-analyzer","dockerfile":"infra/docker/Dockerfile.analyzer"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$API_GATEWAY_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-api-gateway","dockerfile":"infra/docker/Dockerfile.api-gateway"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$MARKET_DATA_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-market-data","dockerfile":"infra/docker/Dockerfile.market-data"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$REALTIME_GATEWAY_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-realtime-gateway","dockerfile":"infra/docker/Dockerfile.realtime-gateway"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$NEWS_SERVICE_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-news-service","dockerfile":"infra/docker/Dockerfile.news-service"}'
          fi

          if [[ "$BUILD_ALL" == "true" || "$INTELLIGENCE_SERVICE_CHANGED" == "true" ]]; then
            add '{"image":"atlsd-intelligence-service","dockerfile":"infra/docker/Dockerfile.intelligence-service"}'
          fi
          json="${json}]}";
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

          if [[ "$json" == '{"include":[]}' ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  docker:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main' && always() && needs.docker.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.PROD_APP_DIR }}
            git pull origin main --ff-only
            cd infra/compose
            docker compose -f prod.yml pull
            docker compose -f prod.yml up -d --remove-orphans
            docker compose -f prod.yml ps




