services:
  postgres:
    image: postgres:16-alpine
    container_name: atlsd
    restart: unless-stopped
    env_file:
      - ./env/.env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      private:
        ipv4_address: 172.29.0.10
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U atlsd -d core" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      private:
        ipv4_address: 172.29.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    container_name: world-core
    image: wign/atlsd-core
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.core
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ./env/.env.core
    ports:
      - "${CORE_PORT:-8090}:8090"
    depends_on:
      rsshub:
        condition: service_started
        restart: true
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    networks:
      - private
    restart: always

  control-plane:
    container_name: world-control-plane
    image: wign/atlsd-control-plane
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.control-plane
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ./env/.env.control-plane
    ports:
      - "${CONTROL_PLANE_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - private

  portal:
    container_name: portal
    image: wign/atlsd-portal
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.portal
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8081/api/v1}
        VITE_CORE_API_BASE: ${VITE_CORE_API_BASE:-http://localhost:8090}
        VITE_CORE_WS_BASE: ${VITE_CORE_WS_BASE:-ws://localhost:8090}
    env_file:
      - ./env/.env.portal
    ports:
      - "${PORTAL_PORT:-5173}:80"
    depends_on:
      control-plane:
        condition: service_started
      core:
        condition: service_started
    networks:
      - private

  ingestion-gateway:
    container_name: ingestion-gateway
    image: wign/atlsd-ingestion
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.ingestion
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ./env/.env.ingestion
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - private

  bot:
    container_name: world-bot
    image: wign/atlsd-bot
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.bot
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ./env/.env.bot
    environment:
      - DATABASE_PATH=/app/data/bot.db
    volumes:
      - ./data/bot:/app/data
    depends_on:
      core:
        condition: service_started
    restart: always
    networks:
      - private

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshubs
    restart: unless-stopped
    env_file:
      - ./env/.env.rsshub
    ports:
      - "1201:1200"
    networks:
      private:
        ipv4_address: 172.29.0.12
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1200/',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  private:
    external: false
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  postgres_data:
  redis_data:
