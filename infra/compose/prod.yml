services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-prod
    restart: always
    env_file:
      - ../env/.env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlsd -d core"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse-prod
    restart: always
    environment:
      CLICKHOUSE_DB: market
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - private
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    restart: always
    command:
      - redis-server
      - --appendonly
      - yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - private

  db-migrate:
    image: postgres:16-alpine
    container_name: db-migrate
    restart: "no"
    env_file:
      - ../env/.env.db
    volumes:
      - ../../db/migrations/core:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -eu
        export PGPASSWORD="$${POSTGRES_PASSWORD:-}"
        for migration in $$(ls /migrations/*.sql | sort); do
          echo "Applying $$migration"
          psql -v ON_ERROR_STOP=1 -h postgres -U "$${POSTGRES_USER:-atlsd}" -d "$${POSTGRES_DB:-core}" -f "$$migration"
        done
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

  clickhouse-migrate:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse-migrate
    restart: "no"
    volumes:
      - ../../db/migrations/clickhouse:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -eu
        for migration in $$(ls /migrations/*.sql | sort); do
          echo "Applying $$migration"
          clickhouse-client --host clickhouse --multiquery < "$$migration"
        done
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - private

  api-gateway:
    container_name: api-gateway
    image: wign/atlsd-api-gateway
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api-gateway
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      market-data:
        condition: service_started
      news-service:
        condition: service_started
      intelligence-service:
        condition: service_started
    restart: always
    networks:
      - private

  market-data:
    container_name: market-data
    image: wign/atlsd-market-data
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.market-data
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.market-data
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  realtime-gateway:
    container_name: realtime-gateway
    image: wign/atlsd-realtime-gateway
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.realtime-gateway
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.realtime-gateway
    ports:
      - "${REALTIME_GATEWAY_PORT:-8020}:8020"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  news-service:
    container_name: news-service
    image: wign/atlsd-news-service
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.news-service
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.news-service
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  intelligence-service:
    container_name: intelligence-service
    image: wign/atlsd-intelligence-service
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.intelligence-service
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.intelligence-service
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
      analyzer:
        condition: service_started
    restart: always
    networks:
      - private

  control-plane:
    container_name: world-control-plane
    image: wign/atlsd-control-plane
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.control-plane
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.control-plane
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: always
    networks:
      - private


  ingestion-gateway:
    container_name: ingestion-gateway
    image: wign/atlsd-ingestion
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingestion
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.ingestion
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshubs
    restart: unless-stopped
    env_file:
      - ../env/.env.rsshub
    ports:
      - "1201:1200"
    networks:
      - private
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1200/',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10


  analyzer:
    container_name: world-analyzer-prod
    image: wign/atlsd-analyzer:latest
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.analyzer
    ports:
      - "5000:5000"
    restart: always
    env_file:
      - ../env/.env.analyze
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started
    networks:
      - private
  
  public-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.public-web
    env_file:
      - ../env/.env.public-web
    container_name: atlsd-public-web
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
    ports:
      - "${PUBLIC_WEB_PORT:-5173}:5173"
    restart: unless-stopped

networks:
  private:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  redis_data: