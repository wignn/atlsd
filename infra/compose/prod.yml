services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-prod
    restart: always
    env_file:
      - ../env/.env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - private

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse-prod
    restart: always
    environment:
      CLICKHOUSE_DB: market
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    restart: always
    command:
      - redis-server
      - --appendonly
      - yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  control-plane:
    container_name: world-control-plane
    image: wign/atlsd-control-plane
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.control-plane
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.control-plane
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - private


  core:
    container_name: world-core-prod
    image: wign/atlsd-core:latest
    env_file:
      - ../env/.env.core
    ports:
      - "8090:8090"
    depends_on:
      - postgres
      - redis
      - clickhouse
      - analyzer
    networks:
      - private
    restart: always

  ingestion-gateway:
    container_name: ingestion-gateway
    image: wign/atlsd-ingestion
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingestion
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.ingestion
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - private

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshubs
    restart: unless-stopped
    env_file:
      - ../env/.env.rsshub
    ports:
      - "1201:1200"
    networks:
      - private
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1200/',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10


  analyzer:
    container_name: world-analyzer-prod
    image: wign/atlsd-analyzer:latest
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.analyzer
    ports:
      - "5000:5000"
    restart: always
    networks:
      - private

networks:
  private:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
