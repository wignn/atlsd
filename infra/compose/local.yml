services:
  postgres:
    image: postgres:16-alpine
    container_name: atlsd
    restart: unless-stopped
    env_file:
      - ../env/.env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      private:
        ipv4_address: 172.29.0.10
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U atlsd -d core" ]
      interval: 10s
      timeout: 5s
      retries: 5
      
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: market
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    networks:
      private:
        ipv4_address: 172.29.0.12
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      private:
        ipv4_address: 172.29.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - private

  clickhouse-migrate:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse-migrate
    restart: "no"
    volumes:
      - ../../db/migrations/clickhouse:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -eu
        for migration in $$(ls /migrations/*.sql | sort); do
          echo "Applying $$migration"
          clickhouse-client --host clickhouse --multiquery < "$$migration"
        done
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - private

  api-gateway:
    container_name: api-gateway
    image: wign/atlsd-api-gateway
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api-gateway
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-data:
        condition: service_started
      news-service:
        condition: service_started
      intelligence-service:
        condition: service_started
    restart: always
    networks:
      - private

  market-data:
    container_name: market-data
    image: wign/atlsd-market-data
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.market-data
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.market-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  realtime-gateway:
    container_name: realtime-gateway
    image: wign/atlsd-realtime-gateway
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.realtime-gateway
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.realtime-gateway
    ports:
      - "${REALTIME_GATEWAY_PORT:-8020}:8020"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  news-service:
    container_name: news-service
    image: wign/atlsd-news-service
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.news-service
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.news-service
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  intelligence-service:
    container_name: intelligence-service
    image: wign/atlsd-intelligence-service
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.intelligence-service
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.intelligence-service
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
      analyzer:
        condition: service_started
    restart: always
    networks:
      - private
  control-plane:
    container_name: world-control-plane
    image: wign/atlsd-control-plane
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.control-plane
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.control-plane
    ports:
      - "${CONTROL_PLANE_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - private

  portal:
    container_name: portal
    image: wign/atlsd-portal
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.portal
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8081/api/v1}
        VITE_CORE_API_BASE: ${VITE_CORE_API_BASE:-http://localhost:8000}
        VITE_CORE_WS_BASE: ${VITE_CORE_WS_BASE:-ws://localhost:8020}
    env_file:
      - ../env/.env.portal
    ports:
      - "${PORTAL_PORT:-5173}:80"
    depends_on:
      control-plane:
        condition: service_started
    networks:
      - private

  ingestion-gateway:
    container_name: ingestion-gateway
    image: wign/atlsd-ingestion
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingestion
      args:
        - DOCKER_BUILD_TYPE=release
    env_file:
      - ../env/.env.ingestion
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: always
    networks:
      - private

  analyzer:
    container_name: world-analyzer
    image: wign/atlsd-analyzer
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.analyzer
    ports:
      - "5000:5000"
    restart: always
    networks:
      private:
        ipv4_address: 172.29.0.13
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")'"]
      interval: 15s
      timeout: 5s
      retries: 5

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshubs
    restart: unless-stopped
    env_file:
      - ../env/.env.rsshub
    ports:
      - "1201:1200"
    networks:
      - private
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1200/',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  private:
    external: false
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:



