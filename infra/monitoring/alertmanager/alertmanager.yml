global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: http://127.0.0.1:9/alertmanager-placeholder
        send_resolved: true

# Production note:
# Replace the placeholder webhook URL with your alert bridge endpoint, or configure
# Grafana contact points for Discord/Telegram after Grafana is running.
