groups:
  - name: host
    rules:
      - alert: HostHighCpu
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is high"
          description: "CPU usage has been above 85% for 10 minutes."

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is high"
          description: "Memory usage has been above 90% for 5 minutes."

      - alert: HostHighDisk
        expr: 100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host disk usage is high"
          description: "Disk usage is above 85%."

  - name: containers
    rules:
      - alert: ContainerDown
        expr: absent(container_last_seen{image!="",name=~"api-gateway|market-data|realtime-gateway|ingestion-gateway|bot|news-service|intelligence-service|postgres-prod|clickhouse-prod|redis-prod|nats"})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Required container is missing"
          description: "One of the required ATLSD containers is not visible to cAdvisor."

      - alert: ContainerHighMemory
        expr: (container_memory_working_set_bytes{image!="",name!=""} / container_spec_memory_limit_bytes{image!="",name!=""}) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container memory usage is high"
          description: "Container {{ $labels.name }} memory usage is above 90%."

  - name: service-health
    rules:
      - alert: ServiceHealthcheckDown
        expr: probe_success{group="atlsd-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service healthcheck down"
          description: "{{ $labels.instance }} has failed health checks for 2 minutes."

      - alert: ServiceHealthcheckSlow
        expr: probe_duration_seconds{group="atlsd-services"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service healthcheck is slow"
          description: "{{ $labels.instance }} healthcheck is slower than 2 seconds."
