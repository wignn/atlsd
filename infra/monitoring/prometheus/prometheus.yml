global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: nats
    metrics_path: /varz
    static_configs:
      - targets: ["nats:8222"]

  - job_name: realtime-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["realtime-gateway:8020"]

  - job_name: service-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api-gateway:8000/health
          - http://market-data:8010/health
          - http://realtime-gateway:8020/health
          - http://news-service:8030/health
          - http://intelligence-service:8040/health
          - http://world-control-plane:8080/health
          - http://ingestion-gateway:8091/health
        labels:
          group: atlsd-services
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: https?://([^:/]+).*
        target_label: service
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
